<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1ЦЭГЦ</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      // Prevent libraries from trying to polyfill fetch if it already exists
      // This fixes "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      if (window.fetch) {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: () => originalFetch,
            set: () => { 
              console.warn('A library tried to overwrite window.fetch. This operation was blocked.');
            }
          });
        } catch (e) {
          // Property might already be non-configurable, which is fine
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
